[pytest]
# Marker registry. This replaces Osprey's testNG/*.xml suite XML files —
# tests are tagged with markers and selected at runtime via -m expressions.
#
# Convention: smoke|regression|kpi|nfr|stress  +  team_<name>  +  feature_<name>
# Example invocations:
#   pytest -m "smoke"
#   pytest -m "regression and team_allstars"
#   pytest -m "kpi and not slow"
markers =
    smoke: fast, broad coverage; runs on every push
    regression: full functional suite; runs nightly
    kpi: performance KPI measurements
    nfr: non-functional requirement thresholds
    stress: long-running soak / stress tests
    slow: takes > 30 seconds
    team_allstars: AllStars team's regression scope
    team_gogeta: Gogeta team's regression scope
    team_xteam: XTeam team's regression scope
    feature_tune: tuning / channel-change feature
    feature_power: power on/off / standby feature
    feature_measure: signal-quality measurement feature

# Default options applied unless overridden on the CLI.
# - Strict markers: typo'd marker names fail collection (caught early).
# - Short tracebacks: easier to read in ReportStack log viewer.
addopts =
    --strict-markers
    -ra
    --tb=short

# Logging captured into log_capture.py and forwarded to ReportStack via the
# pytest-automation-reports plugin.
log_cli = false
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)8s] %(name)s — %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
