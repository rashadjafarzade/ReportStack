[pytest]
# Marker registry. Replaces TestNG XML suites — tests are tagged with
# markers and selected at runtime via -m expressions.
#
# Three orthogonal axes:
#   1. Layer (the system under test): ui | api | nfr
#   2. NFR sub-type (only when -m nfr): performance | stress | reliability
#   3. Kind: smoke | regression | slow
#
# Example invocations:
#   pytest -m smoke
#   pytest -m "ui and regression"
#   pytest -m "api and not slow"
#   pytest -m "nfr and nfr_performance"
#   pytest -m "(ui or api) and smoke"
markers =
    # Layer (test target)
    ui: drives the TNC web application via Selenium
    api: hits the radio devices' backend HTTP API
    nfr: non-functional requirement test (always combined with one nfr_* sub-type)

    # NFR sub-types
    nfr_performance: latency / throughput thresholds on a steady workload
    nfr_stress: behaviour under overload — concurrency, oversize payloads, error rates
    nfr_reliability: long-running stability — leaks, drift, repeated cycles

    # Kind
    smoke: fast, broad coverage; runs on every push
    regression: full functional suite; runs nightly
    slow: takes > 30 seconds (use to exclude from smoke runs)

# Default options applied unless overridden on the CLI.
# - Strict markers: typo'd marker names fail collection (caught early).
# - Short tracebacks: easier to read in ReportStack log viewer.
addopts =
    --strict-markers
    -ra
    --tb=short

log_cli = false
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)8s] %(name)s — %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
